services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: call_sessions
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  call-session:
    build:
      context: ./services/call-session-nest
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: call_sessions
      NODE_ENV: development
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  voice-pipeline:
    build:
      context: ./services/voice-pipeline-fastapi
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      PIPELINE_CALL_SESSION_URL: http://call-session:3001
      PIPELINE_REDIS_URL: redis://redis:6379/0
    depends_on:
      - call-session
      - redis
    restart: unless-stopped

volumes:
  pgdata:
